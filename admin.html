<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EMI PORTAL FINAL FIX V2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
  min-height:100vh;
}
.card{ border-radius:15px; }
.hidden{ display:none; }
.result-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-bottom:6px;
  background:#fff;
}
</style>
</head>

<body>

<div class="container py-3">

<div class="card p-3 mb-3 text-center">
<h4>⚙️ EMI Admin Portal</h4>

<button class="btn btn-primary m-1" onclick="showSection('add')">➕ Add Data</button>
<button class="btn btn-warning m-1" onclick="showSection('edit')">✏️ Edit Data</button>

</div>

<div id="addSection" class="card p-3 hidden">
<h5>➕ Add EMI Data</h5>

<input id="add_name" class="form-control mb-2" placeholder="Enter Name">

<select id="add_month" class="form-select mb-2">
<option value="">Select Month</option>
<option value="jan">Jan</option>
<option value="feb">Feb</option>
<option value="mar">Mar</option>
<option value="apr">Apr</option>
<option value="may">May</option>
<option value="jun">Jun</option>
<option value="jul">Jul</option>
<option value="aug">Aug</option>
<option value="sep">Sep</option>
<option value="oct">Oct</option>
<option value="nov">Nov</option>
<option value="dec">Dec</option>
</select>

<div class="row">
<div class="col-4"><input id="add_emi" class="form-control" placeholder="EMI"></div>
<div class="col-4"><input id="add_loan" class="form-control" placeholder="Loan"></div>
<div class="col-4"><input id="add_int" class="form-control" placeholder="Interest"></div>
</div>

<button onclick="saveData()" class="btn btn-success w-100 mt-3">💾 Save</button>
</div>

<div id="editSection" class="card p-3 hidden">
<h5>✏️ Edit Data</h5>

<input id="search" class="form-control mb-2" placeholder="Search name..." onkeyup="searchData()">
<div id="list"></div>

<input id="edit_name" class="form-control mt-2 mb-2" readonly>

<select id="edit_month" class="form-select mb-2" onchange="loadMonthData()">
<option value="">Select Month</option>
<option value="jan">Jan</option>
<option value="feb">Feb</option>
<option value="mar">Mar</option>
<option value="apr">Apr</option>
<option value="may">May</option>
<option value="jun">Jun</option>
<option value="jul">Jul</option>
<option value="aug">Aug</option>
<option value="sep">Sep</option>
<option value="oct">Oct</option>
<option value="nov">Nov</option>
<option value="dec">Dec</option>
</select>

<div class="row">
<div class="col-4"><input id="edit_emi" class="form-control" placeholder="EMI"></div>
<div class="col-4"><input id="edit_loan" class="form-control" placeholder="Loan"></div>
<div class="col-4"><input id="edit_int" class="form-control" placeholder="Interest"></div>
</div>

<button onclick="updateData()" class="btn btn-warning w-100 mt-3">Update</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>

const config={
apiKey:"AIzaSyDvHRppOE9aiiNT7MyvkScRTo4eWYiiWOQ",
authDomain:"sss-namana.firebaseapp.com",
databaseURL:"https://sss-namana-default-rtdb.firebaseio.com/",
projectId:"sss-namana"
};

firebase.initializeApp(config);
const db=firebase.database();

let cache={}, editId=null;

db.ref("records").on("value",(s)=>{
cache=s.val()||{};
});

function showSection(type){
addSection.classList.add("hidden");
editSection.classList.add("hidden");

if(type==='add') addSection.classList.remove("hidden");
if(type==='edit') editSection.classList.remove("hidden");
}

function saveData(){

let n=add_name.value.trim();
let m=add_month.value;

if(!n || !m){ alert("Fill all"); return; }

db.ref("records").once("value").then(s=>{
let data=s.val()||{};
for(let id in data){
if(data[id].name && data[id].name.toLowerCase()===n.toLowerCase()){
alert("❌ Duplicate Name");
return;
}
}

let obj={emi:+add_emi.value||0,loan:+add_loan.value||0,int:+add_int.value||0};
let months={}; months[m]=obj;

db.ref("records").push({name:n,months:months})
.then(()=>alert("✅ Saved"));
});
}

function searchData(){
let s=search.value.toLowerCase();
list.innerHTML="";
if(s.length<2) return;

for(let id in cache){
let r=cache[id];
if(r.name && r.name.toLowerCase().startsWith(s)){

let div=document.createElement("div");
div.className="result-item";

let nameSpan=document.createElement("span");
nameSpan.innerText=r.name;

let btn=document.createElement("button");
btn.className="btn btn-sm btn-success";
btn.innerText="Select";

btn.onclick=function(){
editId=id;
edit_name.value=r.name;

let keys=Object.keys(r.months||{});
if(keys.length){
let m=keys[0];
edit_month.value=m;

let d=r.months[m];
edit_emi.value=d.emi||0;
edit_loan.value=d.loan||0;
edit_int.value=d.int||0;
}
};

div.appendChild(nameSpan);
div.appendChild(btn);
list.appendChild(div);
}
}
}

function loadMonthData(){
if(!editId) return;

let r=cache[editId];
let m=edit_month.value;

if(r.months && r.months[m]){
let d=r.months[m];
edit_emi.value=d.emi||0;
edit_loan.value=d.loan||0;
edit_int.value=d.int||0;
}else{
edit_emi.value=0;
edit_loan.value=0;
edit_int.value=0;
}
}

function updateData(){
if(!editId) return;

let m=edit_month.value;

let obj={emi:+edit_emi.value||0,loan:+edit_loan.value||0,int:+edit_int.value||0};

let months=JSON.parse(JSON.stringify(cache[editId].months||{}));
months[m]=obj;

db.ref("records/"+editId).set({
name:edit_name.value,
months:months
}).then(()=>alert("✅ Updated"));
}

</script>

</body>
</html>
